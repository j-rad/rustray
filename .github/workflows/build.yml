name: Build for all targets

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Targets
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - build: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux-i686
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - build: linux-i686-musl
            os: ubuntu-latest
            target: i686-unknown-linux-musl
            
          # macOS Targets
          - build: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
          - build: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            
          # Windows Targets
          - build: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - build: windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            
          # Android Targets
          - build: android-aarch64
            os: ubuntu-latest
            target: aarch64-linux-android
          - build: android-armv7
            os: ubuntu-latest
            target: armv7-linux-androideabi
          - build: android-x86_64
            os: ubuntu-latest
            target: x86_64-linux-android
          - build: android-i686
            os: ubuntu-latest
            target: i686-linux-android
            
          # iOS Targets
          - build: ios-aarch64
            os: macos-latest
            target: aarch64-apple-ios
          - build: ios-x86_64-sim
            os: macos-latest
            target: x86_64-apple-ios
          - build: ios-aarch64-sim
            os: macos-latest
            target: aarch64-apple-ios-sim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install Musl tools (Ubuntu)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install Cross-compilation tools (Ubuntu i686)
        if: contains(matrix.target, 'i686-unknown-linux-gnu')
        run: sudo apt-get install -y gcc-multilib g++-multilib

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Configure Cargo for Android
        if: contains(matrix.target, 'android')
        run: |
          # Use cargo-ndk instead of manually setting linker flags
          cargo install cargo-ndk

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Standard
        if: "!contains(matrix.target, 'android')"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Android
        if: contains(matrix.target, 'android')
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t ${{ matrix.target }} build --release
