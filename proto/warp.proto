syntax = "proto3";

package rustray.proxy.warp;
option go_package = "github.com/j-rad/rustray/proxy/warp";

message Account {
  string private_key = 1;
  string address_v4 = 2;
  string address_v6 = 3;
  string peer_public_key = 4;
  string device_id = 5;
  bytes reserved = 6;
}

message Config {
  Account account = 1;
}
