syntax = "proto3";

package rustray.proxy.hysteria2;
option go_package = "github.com/j-rad/rustray/proxy/hysteria2";

message Obfuscation {
  string type = 1;
  string password = 2;
}

message Account {
  string password = 1;
}

message Config {
  uint64 up_mbps = 1;
  uint64 down_mbps = 2;
  string password = 3;
  Obfuscation obfuscation = 4;
}
