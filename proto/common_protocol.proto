syntax = "proto3";

package rustray.common.protocol;
option csharp_namespace = "Rustray.Common.Protocol";
option go_package = "github.com/FaezBarghasa/rustray/common/protocol";
option java_package = "com.rustray.common.protocol";
option java_multiple_files = true;

import "common_serial.proto";

// User is a generic user for all protocols.
message User {
  uint32 level = 1;
  string email = 2;

  // Protocol specific account information. Must be the account proto in one of
  // the proxies.
  rustray.common.serial.TypedMessage account = 3;
}
