syntax = "proto3";

package rustray.common.serial;
option csharp_namespace = "Rustray.Common.Serial";
option go_package = "github.com/FaezBarghasa/rustray/common/serial";
option java_package = "com.rustray.common.serial";
option java_multiple_files = true;

// TypedMessage is a serialized proto message along with its type name.
message TypedMessage {
  // The name of the message type, retrieved from protobuf API.
  string type = 1;
  // Serialized proto message.
  bytes value = 2;
}
