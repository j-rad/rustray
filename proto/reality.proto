syntax = "proto3";

package rustray.transport.internet.reality;
option go_package = "github.com/j-rad/rustray/transport/internet/reality";

message Config {
  bool show = 1;
  string dest = 2;
  uint64 xver = 3;
  repeated string server_names = 4;
  bytes private_key = 5;
  bytes public_key = 6;
  string min_client_ver = 7;
  string max_client_ver = 8;
  uint64 max_time_diff = 9;
  repeated string short_ids = 10;
  string fingerprint = 11;
  string server_name = 12;
  string spider_x = 13;
}
